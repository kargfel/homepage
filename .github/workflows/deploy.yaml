name: Deploy to Homeserver

on:
  push:
    branches: ["main"] # Triggers when you push to the main branch

jobs:
  deploy:
    runs-on: self-hosted # This tells GitHub to run this on YOUR homeserver
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy using Docker Compose
        # This will build the Dockerfile and start the container on your server
        run: |
          rsync -avz --delete --exclude='.env' ./ /home/felix/stacks/homepage/
         
          # Run compose for the specific service
          cd /home/felix/stacks
          docker compose up -d --build homepage
          docker image prune -f
